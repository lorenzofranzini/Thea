<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Moderno</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

/* MENU */
#menu {
    position: absolute;
    text-align: center;
}

h1 {
    color: #2c3e50;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6dd5ed, #2193b0);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.08);
}

/* CANVAS */
canvas {
    display: none;
    border-radius: 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* RESET BUTTON */
#resetBtn {
    position: absolute;
    bottom: 30px;
    display: none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <h1>PONG</h1>
    <p>Scegli difficoltà</p>
    <button onclick="startGame(0.05)">Facile</button>
    <button onclick="startGame(0.1)">Medio</button>
    <button onclick="startGame(0.2)">Difficile</button>
</div>

<canvas id="pongCanvas" width="800" height="400"></canvas>

<button id="resetBtn" onclick="resetGame()">Torna al menu</button>

<script>
const canvas = document.getElementById("pongCanvas");
const ctx = canvas.getContext("2d");

let aiLevel = 0.1;
let running = false;

// OGGETTI
let ball, user, com;

// INIT
function init() {
    ball = {
        x: 400,
        y: 200,
        radius: 8,
        speed: 5,
        velocityX: 5,
        velocityY: 5
    };

    user = {
        x: 10,
        y: 150,
        width: 12,
        height: 100,
        score: 0
    };

    com = {
        x: 778,
        y: 150,
        width: 12,
        height: 100,
        score: 0
    };
}

// START
function startGame(level) {
    aiLevel = level;
    init();
    running = true;

    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("resetBtn").style.display = "block";
}

// RESET
function resetGame() {
    running = false;
    document.getElementById("menu").style.display = "block";
    canvas.style.display = "none";
    document.getElementById("resetBtn").style.display = "none";
}

// MOUSE CONTROL
canvas.addEventListener("mousemove", e => {
    let rect = canvas.getBoundingClientRect();
    user.y = e.clientY - rect.top - user.height / 2;
});

// DISEGNI
function drawRoundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
    ctx.fill();
}

function drawNet() {
    ctx.setLineDash([10,10]);
    ctx.strokeStyle = "#aaa";
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, 0);
    ctx.lineTo(canvas.width/2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
}

// UPDATE
function update() {
    ball.x += ball.velocityX;
    ball.y += ball.velocityY;

    // AI
    com.y += (ball.y - (com.y + com.height/2)) * aiLevel;

    // BORDI
    if (ball.y < 0 || ball.y > canvas.height)
        ball.velocityY *= -1;

    // PUNTI
    if (ball.x < 0) {
        com.score++;
        resetBall();
    }
    if (ball.x > canvas.width) {
        user.score++;
        resetBall();
    }

    let player = ball.x < canvas.width/2 ? user : com;

    if (
        ball.x < player.x + player.width &&
        ball.x > player.x &&
        ball.y < player.y + player.height &&
        ball.y > player.y
    ) {
        ball.velocityX *= -1;
        ball.speed += 0.3;
    }
}

function resetBall() {
    ball.x = 400;
    ball.y = 200;
    ball.velocityX *= -1;
    ball.speed = 5;
}

// RENDER
function render() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawNet();

    // SCORE
    ctx.fillStyle = "#2c3e50";
    ctx.font = "bold 40px Segoe UI";
    ctx.fillText(user.score, canvas.width/4, 60);
    ctx.fillText(com.score, 3*canvas.width/4, 60);

    // PADDLE
    ctx.fillStyle = "#2c3e50";
    ctx.shadowColor = "rgba(0,0,0,0.2)";
    ctx.shadowBlur = 10;

    drawRoundedRect(user.x, user.y, user.width, user.height, 8);
    drawRoundedRect(com.x, com.y, com.width, com.height, 8);

    ctx.shadowBlur = 0;

    // BALL (glow)
    let g = ctx.createRadialGradient(ball.x, ball.y, 2, ball.x, ball.y, 10);
    g.addColorStop(0, "#3498db");
    g.addColorStop(1, "#2980b9");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fill();
}

// LOOP FLUIDO
function loop() {
    if (running) {
        update();
        render();
    }
    requestAnimationFrame(loop);
}

init();
loop();
</script>

</body>
</html>
