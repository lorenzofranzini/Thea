<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Colorato</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

/* MENU */
#menu {
    position: absolute;
    text-align: center;
    color: #fff;
}

h1 {
    font-size: 60px;
    margin-bottom: 10px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* CANVAS */
canvas {
    display: none;
    border-radius: 20px;
    background: linear-gradient(180deg, #1e1e2f, #2c2c54);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* RESET */
#resetBtn {
    position: absolute;
    bottom: 20px;
    display: none;
}
</style>
</head>

<body>

<div id="menu">
    <h1>🌈 PONG</h1>
    <p>Scegli difficoltà</p>
    <button onclick="startGame(0.04)">Facile</button>
    <button onclick="startGame(0.08)">Medio</button>
    <button onclick="startGame(0.14)">Difficile</button>
</div>

<canvas id="game" width="800" height="400"></canvas>

<button id="resetBtn" onclick="resetGame()">🔙 Menu</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ai = 0.08;
let running = false;

// OGGETTI
let ball, user, com;
let trail = [];

// INIT
function init() {
    ball = {
        x: 400,
        y: 200,
        r: 8,
        speed: 5,
        vx: 5,
        vy: 3
    };

    user = { x: 20, y: 150, w: 12, h: 100, score: 0 };
    com = { x: 768, y: 150, w: 12, h: 100, score: 0 };

    trail = [];
}

// START
function startGame(level) {
    ai = level;
    init();
    running = true;

    menu.style.display = "none";
    canvas.style.display = "block";
    resetBtn.style.display = "block";
}

// RESET
function resetGame() {
    running = false;
    menu.style.display = "block";
    canvas.style.display = "none";
    resetBtn.style.display = "none";
}

// MOUSE
canvas.addEventListener("mousemove", e => {
    let rect = canvas.getBoundingClientRect();
    user.y = e.clientY - rect.top - user.h / 2;
});

// UPDATE
function update() {
    ball.x += ball.vx;
    ball.y += ball.vy;

    // TRAIL
    trail.push({x: ball.x, y: ball.y});
    if (trail.length > 15) trail.shift();

    // AI
    com.y += (ball.y - (com.y + com.h/2)) * ai;

    // BORDI
    if (ball.y < 0 || ball.y > 400)
        ball.vy *= -1;

    // PUNTI
    if (ball.x < 0) {
        com.score++;
        resetBall();
    }
    if (ball.x > 800) {
        user.score++;
        resetBall();
    }

    let p = ball.x < 400 ? user : com;

    if (
        ball.x < p.x + p.w &&
        ball.x > p.x &&
        ball.y < p.y + p.h &&
        ball.y > p.y
    ) {
        ball.vx *= -1.1;
        ball.vy *= 1.05;
    }
}

function resetBall() {
    ball.x = 400;
    ball.y = 200;
    ball.vx = -ball.vx;
    ball.vy = 3;
    trail = [];
}

// RENDER
function render() {
    ctx.clearRect(0,0,800,400);

    // LINEA CENTRALE
    ctx.setLineDash([8,8]);
    ctx.strokeStyle = "#888";
    ctx.beginPath();
    ctx.moveTo(400,0);
    ctx.lineTo(400,400);
    ctx.stroke();
    ctx.setLineDash([]);

    // SCORE
    ctx.fillStyle = "#fff";
    ctx.font = "bold 40px Segoe UI";
    ctx.fillText(user.score, 200, 50);
    ctx.fillText(com.score, 600, 50);

    // PADDLE COLORATI
    ctx.fillStyle = "#00f5d4";
    ctx.fillRect(user.x, user.y, user.w, user.h);

    ctx.fillStyle = "#f15bb5";
    ctx.fillRect(com.x, com.y, com.w, com.h);

    // TRAIL
    for (let i = 0; i < trail.length; i++) {
        let t = trail[i];
        ctx.fillStyle = `rgba(255,255,255,${i/trail.length})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.r, 0, Math.PI*2);
        ctx.fill();
    }

    // BALL
    let g = ctx.createRadialGradient(ball.x, ball.y, 2, ball.x, ball.y, 10);
    g.addColorStop(0, "#fff");
    g.addColorStop(1, "#00bbf9");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
}

// LOOP
function loop() {
    if (running) {
        update();
        render();
    }
    requestAnimationFrame(loop);
}

init();
loop();
</script>

</body>
</html>
